name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build + Test (macOS 14)
    runs-on: macos-14
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build (debug)
        run: swift build

      - name: Run tests
        run: swift test --parallel

      - name: Build release (Universal Binary smoke test)
        run: swift build -c release --arch arm64 --arch x86_64
