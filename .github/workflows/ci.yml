name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build + Test (macOS 14)
    runs-on: macos-14
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pin to the newest Xcode 15 on the runner.
      # - Xcode 16's Swift 6 frontend applies isolation rules this codebase
      #   hasn't migrated to yet (Swift 6 migration is a separate piece of work).
      # - Needs to be Xcode 15.3+ because Package.swift declares
      #   swift-tools-version: 5.10 (required to reference swift-testing via SPM).
      # - macos-14 runners ship 15.2 / 15.3 / 15.4 alongside 16.x; 15.0.1 is
      #   alphabetically first but has Swift 5.9 and would reject our manifest.
      #   `sort -V` picks the highest 15.x available.
      - name: Select newest Xcode 15
        run: |
          echo "Available Xcode versions:"
          ls -d /Applications/Xcode_15*.app 2>/dev/null || true
          XCODE_PATH=$(ls -d /Applications/Xcode_15*.app 2>/dev/null | sort -V | tail -n1)
          if [ -z "$XCODE_PATH" ]; then
            echo "No Xcode 15 installed on this runner — falling back to default"
          else
            echo "Selecting $XCODE_PATH"
            sudo xcode-select -s "$XCODE_PATH"
          fi

      - name: Swift version
        run: swift --version

      - name: Build (debug)
        run: swift build

      - name: Run tests
        run: swift test --parallel

      - name: Build release (Universal Binary smoke test)
        run: swift build -c release --arch arm64 --arch x86_64
